<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Air Quality Visualization — CS7290</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f8f8f8; color: #333; height: 100vh; display: flex; flex-direction: column; }
  header { background: #1a1a2e; color: #eee; padding: 10px 16px; display: flex; align-items: center; gap: 12px; font-size: 13px; }
  header strong { font-size: 14px; color: #fff; }
  header span { opacity: 0.6; }
  .main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr auto; gap: 0; overflow: hidden; }
  .map-panel { grid-row: 1 / 3; background: #d0e8d0; position: relative; overflow: hidden; }
  .map-bg { width: 100%; height: 100%; background: linear-gradient(160deg, #b8d4b8 0%, #8fb88f 40%, #d4e8b8 70%, #c8d8c8 100%); }
  .road { position: absolute; background: rgba(255,255,255,0.5); }
  .road.h { height: 2px; left: 0; right: 0; }
  .road.v { width: 2px; top: 0; bottom: 0; }
  .sensor { position: absolute; width: 14px; height: 14px; border-radius: 50%; border: 2px solid white; box-shadow: 0 1px 4px rgba(0,0,0,0.4); transform: translate(-50%,-50%); }
  .legend { position: absolute; bottom: 12px; left: 12px; background: rgba(255,255,255,0.9); border-radius: 6px; padding: 8px 10px; font-size: 11px; line-height: 1.8; }
  .legend-row { display: flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .chart-panel { background: #fff; padding: 12px; border-left: 1px solid #eee; display: flex; flex-direction: column; gap: 4px; }
  .chart-panel h3 { font-size: 12px; color: #666; margin-bottom: 4px; }
  .bar-row { display: flex; align-items: center; gap: 6px; font-size: 11px; }
  .bar-row span:first-child { width: 36px; text-align: right; color: #888; }
  .bar-track { flex: 1; background: #eee; border-radius: 2px; height: 10px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; }
  .controls-panel { background: #fff; padding: 10px 12px; border-top: 1px solid #eee; border-left: 1px solid #eee; display: flex; align-items: center; gap: 12px; }
  .controls-panel label { font-size: 11px; color: #666; display: flex; align-items: center; gap: 6px; }
  input[type=range] { width: 80px; accent-color: #e05a2b; }
  select { font-size: 11px; border: 1px solid #ccc; border-radius: 3px; padding: 2px 4px; background: #fff; }
  .badge { font-size: 10px; background: #e8f5e9; color: #2e7d32; border-radius: 10px; padding: 2px 7px; border: 1px solid #a5d6a7; }
</style>
</head>
<body>
<header>
  <strong>Stinky — CS7290 Air Quality</strong>
  <span>Boston, MA · Feb 2024</span>
  <span class="badge" style="margin-left:auto">48 sensors active</span>
</header>
<div class="main">
  <!-- Map panel -->
  <div class="map-panel">
    <div class="map-bg"></div>
    <!-- Roads -->
    <div class="road h" style="top:28%"></div>
    <div class="road h" style="top:54%"></div>
    <div class="road h" style="top:76%"></div>
    <div class="road v" style="left:22%"></div>
    <div class="road v" style="left:50%"></div>
    <div class="road v" style="left:72%"></div>
    <!-- Sensors: green=good, yellow=moderate, orange=unhealthy, red=bad -->
    <div class="sensor" style="background:#4caf50;top:24%;left:18%"></div>
    <div class="sensor" style="background:#4caf50;top:38%;left:30%"></div>
    <div class="sensor" style="background:#ffeb3b;top:50%;left:22%"></div>
    <div class="sensor" style="background:#ff9800;top:30%;left:50%"></div>
    <div class="sensor" style="background:#f44336;top:55%;left:58%"></div>
    <div class="sensor" style="background:#ff9800;top:45%;left:72%"></div>
    <div class="sensor" style="background:#4caf50;top:70%;left:40%"></div>
    <div class="sensor" style="background:#ffeb3b;top:75%;left:65%"></div>
    <div class="sensor" style="background:#f44336;top:20%;left:75%"></div>
    <div class="sensor" style="background:#4caf50;top:62%;left:85%"></div>
    <div class="legend">
      <div class="legend-row"><div class="dot" style="background:#4caf50"></div> Good (0–50)</div>
      <div class="legend-row"><div class="dot" style="background:#ffeb3b"></div> Moderate (51–100)</div>
      <div class="legend-row"><div class="dot" style="background:#ff9800"></div> Unhealthy for sensitive (101–150)</div>
      <div class="legend-row"><div class="dot" style="background:#f44336"></div> Unhealthy (151–200)</div>
    </div>
  </div>

  <!-- Bar chart panel -->
  <div class="chart-panel">
    <h3>PM2.5 by neighbourhood (µg/m³)</h3>
    <div class="bar-row"><span>Back Bay</span><div class="bar-track"><div class="bar-fill" style="width:78%;background:#f44336"></div></div><span>78</span></div>
    <div class="bar-row"><span>Roxbury</span><div class="bar-track"><div class="bar-fill" style="width:61%;background:#ff9800"></div></div><span>61</span></div>
    <div class="bar-row"><span>Fenway</span><div class="bar-track"><div class="bar-fill" style="width:54%;background:#ff9800"></div></div><span>54</span></div>
    <div class="bar-row"><span>JP</span><div class="bar-track"><div class="bar-fill" style="width:38%;background:#ffeb3b"></div></div><span>38</span></div>
    <div class="bar-row"><span>Allston</span><div class="bar-track"><div class="bar-fill" style="width:35%;background:#ffeb3b"></div></div><span>35</span></div>
    <div class="bar-row"><span>Brookline</span><div class="bar-track"><div class="bar-fill" style="width:22%;background:#4caf50"></div></div><span>22</span></div>
    <div class="bar-row"><span>Somerville</span><div class="bar-track"><div class="bar-fill" style="width:18%;background:#4caf50"></div></div><span>18</span></div>
    <div class="bar-row"><span>Cambridge</span><div class="bar-track"><div class="bar-fill" style="width:14%;background:#4caf50"></div></div><span>14</span></div>
  </div>

  <!-- Controls -->
  <div class="controls-panel">
    <label>Date <input type="range" min="1" max="28" value="14"></label>
    <label>Pollutant
      <select><option>PM2.5</option><option>PM10</option><option>NO₂</option><option>O₃</option></select>
    </label>
    <label>Time window
      <select><option>24 h</option><option>7 d</option><option>30 d</option></select>
    </label>
  </div>
</div>
</body>
</html>
